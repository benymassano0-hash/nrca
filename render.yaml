services:
  - type: web
    name: rcna
    runtime: node
    rootDir: .
    autoDeploy: true
    buildCommand: bash render-build.sh
    startCommand: bash render-start.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: postgres
      - key: DB_SSL
        value: require
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true