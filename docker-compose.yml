version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: rcna-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rcna_password
      POSTGRES_DB: rcna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: rcna-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: rcna_password
      DB_NAME: rcna
      PORT: 5000
      JWT_SECRET: sua_chave_secreta_super_segura
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: rcna-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
